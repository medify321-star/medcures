<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="A product of.sh" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Medcures | Your Trusted Medical Information Companion</title>
        <!--
        These two scripts have been added for the Visual Edits, please do not edit or remove them
        -->
        <script>
            // Configure Tailwind (always, not just in iframe)
            window.tailwind = window.tailwind || {};
            tailwind.config = {
                corePlugins: { preflight: false },
                theme: {
                    extend: {
                        colors: {
                            background: 'rgb(11 15 23 / <alpha-value>)',
                            foreground: 'rgb(248 250 252 / <alpha-value>)',
                            card: 'rgb(21 26 37 / <alpha-value>)',
                            'card-foreground': 'rgb(248 250 252 / <alpha-value>)',
                            popover: 'rgb(21 26 37 / <alpha-value>)',
                            'popover-foreground': 'rgb(248 250 252 / <alpha-value>)',
                            primary: 'rgb(56 189 248 / <alpha-value>)',
                            'primary-foreground': 'rgb(15 23 42 / <alpha-value>)',
                            secondary: 'rgb(45 212 191 / <alpha-value>)',
                            'secondary-foreground': 'rgb(15 23 42 / <alpha-value>)',
                            muted: 'rgb(100 116 139 / <alpha-value>)',
                            'muted-foreground': 'rgb(148 163 184 / <alpha-value>)',
                            accent: 'rgb(99 102 241 / <alpha-value>)',
                            'accent-foreground': 'rgb(255 255 255 / <alpha-value>)',
                            destructive: 'rgb(239 68 68 / <alpha-value>)',
                            'destructive-foreground': 'rgb(248 250 252 / <alpha-value>)',
                        }
                    }
                }
            };
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
